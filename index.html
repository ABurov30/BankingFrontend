<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Buro is a banking dashboard for managing accounts, cards, transfers, transactions, notifications, and profile security in one workspace."
    />
    <meta name="application-name" content="Buro" />
    <meta name="apple-mobile-web-app-title" content="Buro" />
    <meta
      name="theme-color"
      content="#f3f6f9"
      media="(prefers-color-scheme: light)"
    />
    <meta
      name="theme-color"
      content="#182027"
      media="(prefers-color-scheme: dark)"
    />
    <meta name="color-scheme" content="light dark" />
    <meta name="format-detection" content="telephone=no" />
    <meta name="robots" content="index, follow" />
    <meta name="referrer" content="strict-origin-when-cross-origin" />

    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Buro" />
    <meta property="og:title" content="Buro Banking Dashboard" />
    <meta
      property="og:description"
      content="Manage accounts, cards, transfers, transactions, notifications, and account security from a focused banking dashboard."
    />

    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="Buro Banking Dashboard" />
    <meta
      name="twitter:description"
      content="Manage accounts, cards, transfers, transactions, notifications, and account security from a focused banking dashboard."
    />

    <title>Buro Banking Dashboard</title>
    <script>
      if (window.matchMedia('(prefers-color-scheme: dark)').matches) {
        document.documentElement.classList.add('dark')
      }
    </script>
  </head>
  <body>
    <noscript>
      Buro requires JavaScript to run. Enable JavaScript in your browser to use
      the banking dashboard.
    </noscript>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
